steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/noblelife-products-mcp:$COMMIT_SHA', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/noblelife-products-mcp:$COMMIT_SHA']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'noblelife-products-mcp'
      - '--image=gcr.io/$PROJECT_ID/noblelife-products-mcp:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=HOST=0.0.0.0,PORT=8080'
images:
  - 'gcr.io/$PROJECT_ID/noblelife-products-mcp:$COMMIT_SHA'
